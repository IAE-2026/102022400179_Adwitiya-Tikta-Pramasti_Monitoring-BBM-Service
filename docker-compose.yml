version: '3.8'

services:
  app:
    build: .
    ports:
      - "8001:8001"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - APP_URL=http://localhost:8001
      - DB_CONNECTION=sqlite
      - IAE_API_KEY=${IAE_API_KEY}
      - DIDIT_SERVICE_URL=${DIDIT_SERVICE_URL:-}
      - HAFIZH_SERVICE_URL=${HAFIZH_SERVICE_URL:-}

volumes: {}